<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset Password</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 64px auto; padding: 24px; background: #0c0c0f; color: #e4e4e7; }
    .card { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 32px; }
    h1 { margin: 0 0 16px; font-size: 20px; }
    input { width: 100%; padding: 10px; background: #0c0c0f; border: 1px solid #27272a; border-radius: 6px; color: #e4e4e7; font-size: 14px; box-sizing: border-box; }
    button { margin-top: 16px; width: 100%; padding: 10px; background: #34d399; border: 0; border-radius: 6px; color: #0c0c0f; font-weight: 600; cursor: pointer; }
    button:disabled { background: #3f3f46; color: #71717a; cursor: not-allowed; }
    .err { color: #f87171; margin-top: 12px; }
    .ok { color: #34d399; margin-top: 12px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; color: #a1a1aa; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    {% if not valid %}
      <p class="err">This reset link is invalid or has expired. Request a new one.</p>
    {% else %}
      <form id="reset-form">
        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" required minlength="8">
        <button type="submit">Reset password</button>
        <div id="message"></div>
      </form>
      <script>
        const form = document.getElementById("reset-form");
        const msg = document.getElementById("message");
        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          msg.textContent = "";
          msg.className = "";
          const resp = await fetch("/api/v1/auth/password/reset/confirm/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              token: "{{ token|escapejs }}",
              new_password: form.new_password.value,
            }),
          });
          const data = await resp.json();
          if (resp.ok) {
            msg.textContent = "Password reset. You can close this tab and log in.";
            msg.className = "ok";
            form.querySelector("button").disabled = true;
          } else {
            msg.textContent = data.detail || JSON.stringify(data);
            msg.className = "err";
          }
        });
      </script>
    {% endif %}
  </div>
</body>
</html>
