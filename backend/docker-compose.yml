services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-meal_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      # Claude Agent SDK auth — mount host's Claude Code credentials so the
      # web container can use the user's Max subscription. Run `claude` once
      # on the host to log in before starting the container.
      - ${HOME}/.claude:/root/.claude
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-key-change-me}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,0.0.0.0}
      POSTGRES_DB: ${POSTGRES_DB:-meal_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      # Explicitly empty so the Agent SDK uses the OAuth credentials below
      # instead of falling back to per-token API billing.
      ANTHROPIC_API_KEY: ""
      # Max subscription OAuth token. On macOS, Claude Code stores this in
      # Keychain — we can't mount Keychain into a Linux container, so the
      # token lives in backend/.env (gitignored) and is passed through here.
      # Extract on host with:
      #   security find-generic-password -s "Claude Code-credentials" -w \
      #     | jq -r .claudeAiOauth.accessToken
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
